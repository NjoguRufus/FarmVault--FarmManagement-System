# Supabase project config (required for `supabase db push`).
# Run `npx supabase link --project-ref YOUR_REF` once to link to your remote project.
# Get YOUR_REF from: Dashboard URL https://supabase.com/dashboard/project/<YOUR_REF>

[api]
enabled = true
port = 54321
schemas = ["public", "core", "projects", "harvest", "finance", "ops", "billing", "admin"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"

[analytics]
enabled = false

# invite-employee uses Clerk JWT only; do not verify Supabase Auth JWT (deploy with --no-verify-jwt).
[functions.invite-employee]
verify_jwt = false

# Clerk session tokens are RS256; Supabase's gateway JWT verify expects HS256 and fails with
# "signing method RS256 is invalid". Verify the Bearer token inside the function instead.
[functions.send-farmvault-email]
verify_jwt = false

[functions.notify-company-workspace-ready]
verify_jwt = false

# No user JWT: invoke with apikey (publishable/anon) only; do not verify Clerk RS256 at gateway.
[functions.notify-company-submission-received]
verify_jwt = false

# Developer notify when a workspace finishes onboarding (anon + service role inside).
[functions.notify-developer-company-registered]
verify_jwt = false

# Clerk Bearer verified inside function (RS256); gateway JWT verify would fail.
[functions.mpesa-stk-push]
verify_jwt = false

# Safaricom Daraja STK callback — no Authorization header.
[functions.mpesa-stk-callback]
verify_jwt = false

# Clerk / secret verified inside function (same pattern as send-farmvault-email).
[functions.billing-receipt-issue]
verify_jwt = false

# pg_cron invokes with Bearer ENGAGEMENT_EMAIL_CRON_SECRET (stored in Vault); no Supabase JWT.
[functions.engagement-email-cron]
verify_jwt = false

[functions.notify-developer-transactional]
verify_jwt = false

[functions.notify-company-transactional]
verify_jwt = false

[functions.notify-ambassador-onboarding]
verify_jwt = false

# Secret header only; no Supabase JWT.
[functions.farmvault-email-test]
verify_jwt = false
