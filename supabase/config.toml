# Supabase project config (required for `supabase db push`).
# Run `npx supabase link --project-ref YOUR_REF` once to link to your remote project.
# Get YOUR_REF from: Dashboard URL https://supabase.com/dashboard/project/<YOUR_REF>

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"

[analytics]
enabled = false
